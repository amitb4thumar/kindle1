<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; }
        .weather {
            font-size: 2rem; 
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Dashboard</h1>
        <div class="weather" id="weather-text">Loading Weather...</div>
        
        <!-- Replace the URL below with your own photo's URL -->
        <img src="https://unsplash.com" alt="Daily Photo" id="daily-photo">
    </div>

    <script>
        // Weather Simulation (Replace with actual API code)
        document.getElementById("weather-text").innerText = "24°C, Sunny";

        // Optional: Auto-refresh the photo every 6 hours
        setInterval(function() {
            var photo = document.getElementById("daily-photo");
            photo.src = "https://unsplash.com?t=" + new Date().getTime();
        }, 21600000);
    </script>
</body>
</html>
